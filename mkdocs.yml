site_name: Schenberg Risk Toolkit
site_description: Composable, lazy pricing for financial instruments — as a graph of formulas.
repo_url: https://github.com/occhima/risk-toolkit
repo_name: occhima/risk-toolkit

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

validation:
  links:
    not_found: warn

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Extending: extending.md
  - API Reference:
      - api/index.md
      - Core Engine: api/core.md
      - Market Data: api/market-data.md
      - Pricing: api/pricing.md
      - Domain: api/domain.md
