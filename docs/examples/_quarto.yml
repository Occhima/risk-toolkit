project:
  title: "Schenberg examples"
  execute-dir: file

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-location: left
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    df-print: paged
    fig-width: 8
    fig-height: 4.5
    fig-format: svg
    highlight-style: github
    page-layout: full
    embed-resources: true
    smooth-scroll: true
    anchor-sections: true

jupyter: python3

execute:
  warning: false
  echo: true
