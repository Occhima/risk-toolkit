project:
  type: book
  output-dir: _book
  execute-dir: file

book:
  title: "Schenberg Risk Toolkit — Examples"
  chapters:
    - index.qmd
    - 01_forward_pricer.qmd
    - 02_vanilla_option.qmd
    - 03_autodiff_greeks.qmd
    - 04_scenario_var.qmd
    - 05_quantlib_benchmark.qmd
    - 06_equity_book.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    code-overflow: wrap
    df-print: paged
    fig-width: 8
    fig-height: 4.5
    fig-format: svg
    highlight-style: github
    smooth-scroll: true
    anchor-sections: true

jupyter: python3

execute:
  warning: false
  echo: true
